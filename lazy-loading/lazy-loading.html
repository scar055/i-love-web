<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy loading</title>
</head>

<body>
    <h1>lazy loading demo</h1>

    <ul>
        <li><img src="https://picsum.photos/id/100/800/600" loading="lazy" width="600" height="400"></li>
        <li><img src="https://picsum.photos/id/901/800/600" loading="eager" width="600" height="400"></li>
        <li><img src="https://picsum.photos/id/15/800/600" loading="lazy" width="600" height="400"></li>
    </ul>

</body>

</html>
