<!doctype html>
<title>Audio met JS</title>
<script type="module">
    // Laad het geluid in

    const button = document.querySelector('btn');

    const audio = new Audio("bass-boom.mp3");

    button.addEventListener('click', function () {
        // Speel het geluid af
        audio.play()
    });
</script>
<button id="btn">Koop die pizza</button>
