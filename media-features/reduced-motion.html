<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reduced motion</title>

    <style>
        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            25% {
                transform: scale(0.9);
            }

            50% {
                transform: scale(1);
            }

            75% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes dissolve {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        p {
            animation: pulse 1s linear infinite both;
            background-color: purple;
            color: white;
            width: 5em;
            padding: 1em;
            border-radius: 10px;


            @media (prefers-reduced-motion: reduce) {
                animation: dissolve 4s linear infinite both;
                background-color: green;
                text-decoration: overline;
            }
        }
    </style>
</head>

<body>

    <p>animation</p>

</body>

</html>
